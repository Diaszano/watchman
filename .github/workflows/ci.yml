name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        env:
          FROM_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          TO_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: .github/scripts/validate-commits.sh "$FROM_SHA" "$TO_SHA"

  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test release configuration
        run: npm run test:release

      - name: Build
        run: npm run build

  container:
    name: Container security
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Verify container configuration
        run: node scripts/test-container-config.mjs

      - name: Build production image
        run: docker build --pull --tag watchman:ci .

      - name: Verify production container
        run: .github/scripts/verify-container.sh watchman:ci

      - name: Report all HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: watchman:ci
          format: table
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Gate on fixable HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: watchman:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  release:
    name: Release and publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [commitlint, quality, container]
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
