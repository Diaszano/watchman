name: Release and Docker

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-main
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release and Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Snapshot release tags
        shell: bash
        run: .github/scripts/resolve-release-tag.sh snapshot "$RUNNER_TEMP/release-tags-before.txt"

      - name: Create semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec semantic-release

      - name: Resolve published version
        id: release
        shell: bash
        run: .github/scripts/resolve-release-tag.sh resolve "$RUNNER_TEMP/release-tags-before.txt" "$GITHUB_OUTPUT"

      - name: Build Docker tags
        id: docker-tags
        shell: bash
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/watchman
          RELEASE_PUBLISHED: ${{ steps.release.outputs.published }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:latest"
            if [[ "$RELEASE_PUBLISHED" == "true" ]]; then
              major="${VERSION%%.*}"
              remainder="${VERSION#*.}"
              minor="${remainder%%.*}"
              echo "${IMAGE}:${VERSION}"
              echo "${IMAGE}:${major}.${minor}"
              echo "${IMAGE}:${major}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
