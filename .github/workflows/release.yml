name: Release and Docker

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.repository }}-main
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release and Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Snapshot release tags
        shell: bash
        run: .github/scripts/resolve-release-tag.sh snapshot "$RUNNER_TEMP/release-tags-before.txt"

      - name: Create semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec semantic-release

      - name: Resolve published version
        id: release
        shell: bash
        run: .github/scripts/resolve-release-tag.sh resolve "$RUNNER_TEMP/release-tags-before.txt" "$GITHUB_OUTPUT"

      - name: Build Docker tags
        id: docker-tags
        shell: bash
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/watchman
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          RELEASE_PUBLISHED: ${{ steps.release.outputs.published }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            echo 'tags<<EOF'
            echo "${DOCKER_IMAGE}:latest"
            echo "${GHCR_IMAGE}:latest"
            if [[ "$RELEASE_PUBLISHED" == "true" ]]; then
              major="${VERSION%%.*}"
              remainder="${VERSION#*.}"
              minor="${remainder%%.*}"
              echo "${DOCKER_IMAGE}:${VERSION}"
              echo "${DOCKER_IMAGE}:${major}.${minor}"
              echo "${DOCKER_IMAGE}:${major}"
              echo "${GHCR_IMAGE}:${VERSION}"
              echo "${GHCR_IMAGE}:${major}.${minor}"
              echo "${GHCR_IMAGE}:${major}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Docker Hub README
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: node scripts/sync-docker-hub-readme.mjs

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/watchman:${{ steps.release.outputs.version || 'latest' }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM to release
        if: steps.release.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.release.outputs.version }}"
          gh release upload "$VERSION" sbom.spdx.json --clobber
